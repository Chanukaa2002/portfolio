name: Update Portfolio Projects

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:       # Manual trigger option

jobs:
  update-projects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch projects with portfolio.yml
        id: fetch-projects
        uses: actions/github-script@v6
        with:
          script: |
            const { data } = await github.rest.search.code({
              q: "filename:portfolio.yml user:Chanukaa2002",
            });

            const projects = await Promise.all(
              data.items.map(async (item) => {
                const repo = item.repository;
                const { data: yamlContent } = await github.rest.repos.getContent({
                  owner: repo.owner.login,
                  repo: repo.name,
                  path: "portfolio.yml",
                });

                const decodedContent = Buffer.from(yamlContent.content, "base64").toString();
                const metadata = jsyaml.load(decodedContent);

                return {
                  title: metadata.title,
                  description: metadata.description,
                  tags: metadata.tags,
                  demo: metadata.demo || null,
                  type: metadata.type,
                  github: repo.html_url,
                  repoUrl: repo.html_url,  # Used for deduplication
                };
              })
            );

            return projects;

      - name: Update projects.jsx
        run: |
          node ./scripts/update-projects.js '${{ toJSON(steps.fetch-projects.outputs.result) }}'

      - name: Commit & Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add src/data/projects.jsx
          git commit -m "Auto-update: Added new projects"
          git push
